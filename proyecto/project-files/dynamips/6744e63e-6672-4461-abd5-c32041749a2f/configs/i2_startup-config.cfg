!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R2
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 no ip address
 duplex auto
 speed auto
!
interface FastEthernet0/0.10
 encapsulation dot1Q 10
 ip address 172.16.0.1 255.255.255.128
!
interface FastEthernet0/0.20
 encapsulation dot1Q 20
 ip address 172.16.0.129 255.255.255.128
!
interface FastEthernet0/0.30
 encapsulation dot1Q 30
 ip address 172.16.2.65 255.255.255.224
!
interface FastEthernet0/0.201
 encapsulation dot1Q 201
 ip address 172.16.1.65 255.255.255.192
!
interface FastEthernet0/0.202
 encapsulation dot1Q 202
 ip address 172.16.2.33 255.255.255.224
!
interface FastEthernet0/0.203
 encapsulation dot1Q 203
 ip address 172.16.1.225 255.255.255.224
!
interface FastEthernet0/0.204
 encapsulation dot1Q 204
 ip address 172.16.2.161 255.255.255.240
!
interface FastEthernet0/1
 ip address 172.16.2.178 255.255.255.252
 duplex auto
 speed auto
!
interface FastEthernet1/0
 ip address 172.16.2.181 255.255.255.252
 duplex auto
 speed auto
!
router ospf 1
 router-id 2.2.2.2
 log-adjacency-changes
 network 172.16.0.0 0.0.0.127 area 0
 network 172.16.0.128 0.0.0.127 area 0
 network 172.16.1.64 0.0.0.63 area 0
 network 172.16.1.224 0.0.0.31 area 0
 network 172.16.2.32 0.0.0.31 area 0
 network 172.16.2.64 0.0.0.31 area 0
 network 172.16.2.160 0.0.0.15 area 0
 network 172.16.2.176 0.0.0.3 area 0
 network 172.16.2.180 0.0.0.3 area 0
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
