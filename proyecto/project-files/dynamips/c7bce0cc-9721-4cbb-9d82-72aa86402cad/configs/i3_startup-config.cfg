!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R3
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 no ip address
 duplex auto
 speed auto
!
interface FastEthernet0/0.301
 encapsulation dot1Q 301
 ip address 172.16.1.129 255.255.255.192
!
interface FastEthernet0/0.302
 encapsulation dot1Q 302
 ip address 172.16.2.1 255.255.255.224
!
interface FastEthernet0/0.303
 encapsulation dot1Q 303
 ip address 172.16.2.97 255.255.255.240
!
interface FastEthernet0/0.304
 encapsulation dot1Q 304
 ip address 172.16.2.113 255.255.255.240
!
interface FastEthernet0/0.305
 encapsulation dot1Q 305
 ip address 172.16.2.145 255.255.255.240
!
interface FastEthernet0/1
 ip address 172.16.2.182 255.255.255.252
 duplex auto
 speed auto
!
interface FastEthernet1/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
router ospf 1
 router-id 3.3.3.3
 log-adjacency-changes
 network 172.16.1.128 0.0.0.63 area 0
 network 172.16.2.0 0.0.0.31 area 0
 network 172.16.2.96 0.0.0.15 area 0
 network 172.16.2.112 0.0.0.15 area 0
 network 172.16.2.144 0.0.0.15 area 0
 network 172.16.2.180 0.0.0.3 area 0
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
